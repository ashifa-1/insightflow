services:

  backend:
    build: ./backend
    container_name: insightflow_backend
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
    - .env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    container_name: insightflow_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

  postgres:
    image: postgres:15
    container_name: insightflow_postgres
    environment:
      POSTGRES_DB: insightflow_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: insightflow_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: